<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Mesh Testing Environment - Final locked Geometry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #D3D6D9; }
        .puzzle-piece {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="w-full max-w-lg bg-[#111422]/95 rounded-3xl p-6 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.6)] border border-slate-800 flex flex-col items-center relative">
        
        <div class="w-full flex items-center justify-between border-b border-slate-800/80 pb-4 mb-4">
            <div class="flex items-center space-x-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10B981]"></span>
                <span class="text-[10px] font-mono font-black tracking-widest text-slate-400 uppercase">SVG Vector Canvas Layer</span>
            </div>
            <span id="active-piece-log" class="text-[10px] font-mono font-bold text-emerald-400 uppercase tracking-wider">Select Interlocking Piece</span>
        </div>

        <div class="w-full flex items-center justify-center relative bg-slate-950/40 rounded-2xl p-4 border border-slate-900 shadow-inner">
            
            <svg viewBox="0 0 200 440" class="w-full max-w-[260px] h-[400px]" id="vector-mesh">

                <!-- 1. DETAILED CYBERNETIC HEAD -->
                <g id="segment-head" class="puzzle-piece" onclick="window.logPieceClick('Cybernetic Cranial Core')">
                    <!-- Head & Neck Base Mapping -->
                    <path d="M 84 35 
                             C 84 20, 116 20, 116 35 
                             C 124 40, 124 58, 120 72 
                             C 116 82, 110 85, 100 88 
                             C 90 85, 84 82, 80 72 
                             C 76 58, 76 40, 84 35 Z" 
                          class="fill-[#A1B5CC] stroke-[#5A738E] stroke-[1.5] hover:fill-[#B9CADA] hover:stroke-emerald-400" />
                </g>

                <!-- NECK HOUSING COLLAR -->
                <path d="M 92 86 L 108 86 L 112 94 L 88 94 Z" class="fill-[#333F4D] stroke-[#28323E] stroke-1" />

                <!-- 2. HIGH-FIDELITY BOWED ARMS & PUZZLE-JOINED CHEST MODULE -->
                <!-- Muted Light Green Optimization Theme -->
                <g id="segment-upper-torso" class="puzzle-piece">
                    
                    <!-- Left Bowed Arm: Sweeps outward from shoulder base, fractures up into an inverted elbow, and places hand panels directly flush against the upper ears -->
                    <path id="piece-left-arm" d="M 70 102 
                             L 54 102
                             C 40 102, 28 116, 28 132
                             C 28 144, 38 152, 48 140
                             L 66 116
                             C 74 116, 76 110, 76 106 Z" 
                          class="fill-[#BFD9C3] stroke-[#6E8F74] stroke-[1.5] hover:fill-[#D2E6D5] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Left Bowed Superior Brachium')" />
                    
                    <!-- Right Bowed Arm: Exact geometric mirror of the hand-on-head configuration -->
                    <path id="piece-right-arm" d="M 130 102 
                             L 146 102
                             C 160 102, 172 116, 172 132
                             C 172 144, 162 152, 152 140
                             L 134 116
                             C 126 116, 124 110, 124 106 Z" 
                          class="fill-[#BFD9C3] stroke-[#6E8F74] stroke-[1.5] hover:fill-[#D2E6D5] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Right Bowed Superior Brachium')" />

                    <!-- Left Chest Half: Features explicit puzzle interlocking tabs along center and abdominal boundaries -->
                    <path id="piece-chest-left" d="M 70 102 L 100 102 L 100 114 C 105 114, 105 124, 100 124 L 100 152 L 68 152 Z" 
                          class="fill-[#CBE6CE] stroke-[#7E9F84] stroke-[1.5] hover:fill-[#DCF0DD] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Anterior Left Chest Plate')" />
                          
                    <!-- Right Chest Half: Features true matching female socket cuts along the layout spine lines -->
                    <path id="piece-chest-right" d="M 100 102 L 130 102 L 132 152 L 100 152 L 100 124 C 105 124, 105 114, 100 114 Z" 
                          class="fill-[#CBE6CE] stroke-[#7E9F84] stroke-[1.5] hover:fill-[#DCF0DD] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Anterior Right Chest Plate')" />
                </g>

                <!-- 3. ZONE 3 MID-SECTION (STOMACH UNTO PELVES) -->
                <!-- Dark Charcoal Core Base Variant Theme with smooth side curves and interlocking puzzle keys -->
                <g id="segment-mid-core" class="puzzle-piece">
                    <!-- Abdominal Segment with clean mechanical side drops and bottom interlocking nodes -->
                    <path id="piece-abdomen" d="M 68 152 
                             L 132 152 
                             L 130 188 
                             C 116 188, 116 196, 100 196 
                             C 84 196, 84 188, 70 188 Z" 
                          class="fill-[#455263] stroke-[#28323E] stroke-[1.5] hover:fill-[#566579] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Abdominal Core Panel')" />
                          
                    <!-- Pelvic Alignment Chassis with curved outer wings wrapping into thigh slots -->
                    <path id="piece-pelvis" d="M 70 188 
                             C 84 188, 84 196, 100 196 
                             C 116 196, 116 188, 130 188 
                             L 132 232 
                             Q 100 252, 68 232 Z" 
                          class="fill-[#556475] stroke-[#333F4D] stroke-[1.5] hover:fill-[#67778B] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Pelvic Alignment Base')" />
                </g>

                <!-- 4. LOWER EXTREMITIES (PILLAR STRUCTURAL LEGS WITH KNEE BLOCK JOINTS) -->
                <!-- Soft Warm Beige Sub-Theme -->
                <g id="segment-lower-extremities" class="puzzle-piece">
                    <!-- Left Upper Thigh Component -->
                    <path id="piece-left-thigh" d="M 68 232 Q 84 242, 100 238 L 98 292 C 86 292, 86 298, 70 298 Z" 
                          class="fill-[#E6CCA8] stroke-[#998161] stroke-[1.5] hover:fill-[#F2DCBE] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Left Femoral Thigh Pillar')" />
                    <!-- Left Lower Shin and Flat Mechanical Foot Block -->
                    <path id="piece-left-shin" d="M 70 298 C 86 298, 86 292, 98 292 L 96 416 L 72 416 Z" 
                          class="fill-[#D9BE96] stroke-[#8C7454] stroke-[1.5] hover:fill-[#EBD1A9] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Left Tibial Shin Foot')" />
                    
                    <!-- Right Upper Thigh Component -->
                    <path id="piece-right-thigh" d="M 100 238 Q 116 242, 132 232 L 130 296 C 114 296, 114 292, 102 292 Z" 
                          class="fill-[#E6CCA8] stroke-[#998161] stroke-[1.5] hover:fill-[#F2DCBE] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Right Femoral Thigh Pillar')" />
                    <!-- Right Lower Shin and Flat Mechanical Foot Block -->
                    <path id="piece-right-shin" d="M 102 292 C 114 292, 114 296, 130 296 L 128 416 L 104 416 Z" 
                          class="fill-[#D9BE96] stroke-[#8C7454] stroke-[1.5] hover:fill-[#EBD1A9] hover:stroke-emerald-400"
                          onclick="window.logPieceClick('Right Tibial Shin Foot')" />
                </g>

                <!-- TARGET CRITERIA WINDOW OVERLAY -->
                <rect x="62" y="250" width="76" height="172" 
                      class="fill-transparent stroke-yellow-400/80 stroke-[1.5] stroke-dasharray-[4_4] pointer-events-none" />
            </svg>
        </div>

        <p class="text-[9px] font-mono text-slate-500 mt-4 text-center leading-relaxed uppercase tracking-wider">
            Vector Node Coordinates Rendered Purely Inside Single Code Environment.<br>
            Hover segments to test native fill mutations and grid bounding states.
        </p>
    </div>

    <script>
        window.logPieceClick = function(segmentLabel) {
            const displayLog = document.getElementById('active-piece-log');
            displayLog.innerText = `LOCKED: ${segmentLabel}`;
            displayLog.classList.remove('text-emerald-400');
            displayLog.classList.add('text-yellow-400');
            setTimeout(() => {
                displayLog.classList.remove('text-yellow-400');
                displayLog.classList.add('text-emerald-400');
            }, 300);
        };
    </script>
</body>
</html>
