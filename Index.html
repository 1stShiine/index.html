<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Room™ - Holographic Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Global Theming & Discreet Mode Variables */
        :root {
            --bg-main: #0B0F19;
            --bg-card: #111422;
            --accent: #10B981; /* Emerald */
            --accent-glow: rgba(16, 185, 129, 0.4);
            --svg-base: rgba(255, 255, 255, 0.03);
            --svg-stroke: rgba(255, 255, 255, 0.15);
            --ghost-opacity: 0.05;
        }
        
        .discreet-active {
            --bg-main: #090A0F;
            --bg-card: #12141C;
            --accent: #F59E0B; /* Amber */
            --accent-glow: rgba(245, 158, 11, 0.4);
            --svg-base: rgba(255, 255, 255, 0.02);
            --svg-stroke: rgba(245, 158, 11, 0.2);
        }

        body { transition: background-color 0.4s ease, color 0.4s ease; overscroll-behavior-y: none; }
        .smooth-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Holographic Avatar Styling */
        .body-map-container { perspective: 1000px; overflow: visible; }
        .svg-body { 
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy spring zoom */
            transform-origin: center; 
        }
        .flipped { transform: scaleX(-1); }
        
        .macro-zone, .micro-piece { 
            cursor: pointer; 
            fill: var(--svg-base); 
            stroke: var(--svg-stroke); 
            stroke-width: 2; 
            stroke-linejoin: round;
            transition: all 0.3s ease;
        }
        
        .macro-zone:hover { fill: rgba(255,255,255,0.08); stroke: var(--accent); }
        .ghosted { opacity: var(--ghost-opacity); pointer-events: none; }
        
        .micro-piece:hover { stroke: var(--accent); fill: var(--accent-glow); }
        .piece-active { 
            stroke: var(--accent); 
            stroke-width: 3; 
            fill: var(--accent);
            filter: drop-shadow(0 0 15px var(--accent-glow)); 
        }

        /* 3D Chunky Vertical Heat Map Slider */
        input[type=range][orient=vertical] {
            appearance: slider-vertical;
            width: 14px;
            height: 180px;
            cursor: pointer;
            background: linear-gradient(to top, #10B981, #F59E0B, #EF4444);
            border-radius: 12px;
            outline: none;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5);
        }
        input[type=range][orient=vertical]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #111422;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            cursor: grab;
        }
        input[type=range][orient=vertical]::-webkit-slider-thumb:active { cursor: grabbing; }

        /* 3D Time Track Buttons */
        .time-btn {
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-bottom: 2px solid rgba(0,0,0,0.5);
        }
        .time-btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.3); border-bottom: 0px; }

        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="global-body" class="bg-[var(--bg-main)] text-slate-200 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <div id="master-header" class="smooth-transition flex-shrink-0 z-50 bg-inherit relative shadow-[0_4px_20px_rgba(0,0,0,0.3)]">
        <header class="border-b border-slate-800/80 px-6 py-4">
            <div class="max-w-6xl mx-auto flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <span id="header-pulse" class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_12px_var(--accent-glow)] animate-pulse"></span>
                    <span id="brand-logo" class="font-black tracking-widest text-xs uppercase text-white">Medical Room™</span>
                </div>
                <button onclick="window.toggleDiscreetMode()" class="flex items-center space-x-2 bg-slate-900 border border-slate-800 px-4 py-2 rounded-full hover:border-slate-700 transition">
                    <span class="text-xs">👁️</span>
                    <span class="text-[10px] font-black uppercase tracking-widest text-slate-400" id="discreet-text">Discreet: OFF</span>
                </button>
            </div>
        </header>

        <nav class="max-w-4xl mx-auto w-full px-4 py-3">
            <div class="grid grid-cols-3 gap-2 bg-[#111422] border border-slate-800/60 p-1.5 rounded-2xl">
                <button onclick="window.switchTab(1)" id="tab-btn-1" class="border border-transparent text-slate-500 hover:text-slate-300 flex flex-col items-center justify-center py-2 rounded-xl transition">
                    <span class="text-lg mb-1">🧬</span><span class="text-[9px] font-black uppercase tracking-widest">Bio-Labs</span>
                </button>
                <button onclick="window.switchTab(2)" id="tab-btn-2" class="border border-transparent text-slate-500 hover:text-slate-300 flex flex-col items-center justify-center py-2 rounded-xl transition">
                    <span class="text-lg mb-1">🛋️</span><span class="text-[9px] font-black uppercase tracking-widest">Mind Couch</span>
                </button>
                <button onclick="window.switchTab(3)" id="tab-btn-3" class="bg-[var(--accent-glow)] border border-[var(--accent)] text-[var(--accent)] flex flex-col items-center justify-center py-2 rounded-xl transition">
                    <span class="text-lg mb-1">🩺</span><span class="text-[9px] font-black uppercase tracking-widest">Active Clinic</span>
                </button>
            </div>
        </nav>
    </div>

    <main class="flex-grow w-full mx-auto flex flex-col h-full overflow-hidden relative">
        
        <section id="tab-1" class="hidden h-full flex items-center justify-center">
            <div class="text-center space-y-3"><h2 class="text-2xl font-black uppercase">Bio-Logic Storefront</h2><p class="text-slate-500 text-sm">AccessPoint dx Lab Integrations</p></div>
        </section>

        <section id="tab-2" class="hidden h-full flex items-center justify-center">
            <div class="text-center space-y-3"><h2 class="text-2xl font-black uppercase">Mind Couch</h2><p class="text-slate-500 text-sm">Encrypted Psychiatric Sync</p></div>
        </section>

        <section id="tab-3" class="h-full flex flex-col p-4">
            
            <div id="organ-track" class="smooth-transition flex-shrink-0 mb-4 max-w-6xl mx-auto w-full">
                <span class="text-[9px] font-black tracking-widest uppercase text-slate-500 block mb-2 px-2">Fast-Track Systems</span>
                <div class="flex space-x-2 overflow-x-auto pb-2 scrollbar-none px-2">
                    <button class="bg-[#111422] border border-slate-700 text-[10px] font-bold uppercase tracking-wider px-4 py-2.5 rounded-lg whitespace-nowrap hover:border-[var(--accent)] transition shadow-md">Cardio / Heart</button>
                    <button class="bg-[#111422] border border-slate-700 text-[10px] font-bold uppercase tracking-wider px-4 py-2.5 rounded-lg whitespace-nowrap hover:border-[var(--accent)] transition shadow-md">Hepatic / Liver</button>
                    <button class="bg-[#111422] border border-slate-700 text-[10px] font-bold uppercase tracking-wider px-4 py-2.5 rounded-lg whitespace-nowrap hover:border-[var(--accent)] transition shadow-md">Renal / Kidneys</button>
                </div>
            </div>

            <div class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-0 relative max-w-6xl mx-auto w-full">
                
                <div id="touch-area" class="lg:col-span-5 bg-[#111422] border border-slate-800 rounded-3xl p-6 flex flex-col relative overflow-hidden shadow-2xl">
                    
                    <div class="flex items-center justify-between z-10">
                        <div class="bg-slate-900 border border-slate-700 rounded-lg flex p-1 shadow-inner">
                            <button onclick="window.pivotBody('Front')" id="btn-front" class="bg-slate-800 text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition shadow-sm">Front</button>
                            <button onclick="window.pivotBody('Back')" id="btn-back" class="text-slate-500 hover:text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition">Back</button>
                        </div>
                        
                        <button onclick="window.resetMacroMap()" id="btn-reset" class="hidden bg-slate-800/80 backdrop-blur border border-slate-700 text-[9px] font-bold text-slate-300 uppercase tracking-widest hover:text-white transition flex items-center px-3 py-2 rounded-lg shadow-lg">
                            <span class="mr-2 text-lg leading-none">«</span> Swipe Right
                        </button>
                    </div>

                    <div class="flex-grow flex items-center justify-center body-map-container mt-2 relative">
                        
                        <div id="heat-map-control" class="hidden absolute left-2 top-1/2 -translate-y-1/2 flex-col items-center space-y-3 z-20 bg-[#0B0F19]/80 backdrop-blur-md p-3 rounded-2xl border border-slate-800 shadow-2xl">
                            <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Heat</span>
                            <input type="range" orient="vertical" id="severity-slider" min="1" max="10" value="1" oninput="window.updateHeatMap(this.value)">
                            <span id="severity-val" class="text-[12px] font-black text-emerald-400 drop-shadow-md">1</span>
                        </div>

                        <svg viewBox="0 0 200 450" class="w-full max-w-[240px] max-h-[420px] svg-body" id="human-svg">
                            
                            <g id="macro-head" class="macro-zone" onclick="window.fractureZone('head', 2.2, 15)">
                                <ellipse cx="100" cy="50" rx="32" ry="40" />
                            </g>
                            <g id="micro-head" class="hidden">
                                <path id="head-forehead" class="micro-piece" d="M 68 50 A 32 40 0 0 1 132 50 L 132 55 L 68 55 Z" onclick="window.toggleTactilePiece('head-forehead', 'Forehead')" />
                                <path id="head-eyes" class="micro-piece" d="M 68 55 L 132 55 L 132 68 L 68 68 Z" onclick="window.toggleTactilePiece('head-eyes', 'Eyes')" />
                                <path id="head-jaw" class="micro-piece" d="M 68 68 L 132 68 A 32 40 0 0 1 68 68 Z" onclick="window.toggleTactilePiece('head-jaw', 'Jaw')" />
                            </g>

                            <g id="macro-torso" class="macro-zone" onclick="window.fractureZone('torso', 1.8, -10)">
                                <path d="M 65 105 Q 100 85 135 105 L 130 220 Q 100 235 70 220 Z" />
                            </g>
                            <g id="micro-torso" class="hidden">
                                <path id="torso-chest" class="micro-piece" d="M 65 105 Q 100 85 135 105 L 132 150 Q 100 160 68 150 Z" onclick="window.toggleTactilePiece('torso-chest', 'Chest/Pulmonary')" />
                                <path id="torso-stomach" class="micro-piece" d="M 68 150 Q 100 160 132 150 L 130 220 Q 100 235 70 220 Z" onclick="window.toggleTactilePiece('torso-stomach', 'Abdomen')" />
                            </g>

                            <g id="macro-arms" class="macro-zone" onclick="window.fractureZone('arms', 1.5, -5)">
                                <path d="M 65 105 L 35 190 L 25 260 L 40 260 L 50 190 L 72 145 Z" />
                                <path d="M 135 105 L 165 190 L 175 260 L 160 260 L 150 190 L 128 145 Z" />
                            </g>
                            <g id="micro-arms" class="hidden">
                                <path id="arm-l-shoulder" class="micro-piece" d="M 65 105 L 50 145 L 72 145 Z" onclick="window.toggleTactilePiece('arm-l-shoulder', 'Left Shoulder')" />
                                <path id="arm-l-forearm" class="micro-piece" d="M 50 145 L 35 220 L 45 220 L 72 145 Z" onclick="window.toggleTactilePiece('arm-l-forearm', 'Left Forearm')" />
                                <path id="arm-l-hand" class="micro-piece" d="M 35 220 L 25 260 L 40 260 L 45 220 Z" onclick="window.toggleTactilePiece('arm-l-hand', 'Left Hand')" />
                                
                                <path id="arm-r-shoulder" class="micro-piece" d="M 135 105 L 150 145 L 128 145 Z" onclick="window.toggleTactilePiece('arm-r-shoulder', 'Right Shoulder')" />
                                <path id="arm-r-forearm" class="micro-piece" d="M 150 145 L 165 220 L 155 220 L 128 145 Z" onclick="window.toggleTactilePiece('arm-r-forearm', 'Right Forearm')" />
                                <path id="arm-r-hand" class="micro-piece" d="M 165 220 L 175 260 L 160 260 L 155 220 Z" onclick="window.toggleTactilePiece('arm-r-hand', 'Right Hand')" />
                            </g>

                            <g id="macro-legs" class="macro-zone" onclick="window.fractureZone('legs', 1.4, -25)">
                                <path d="M 70 220 L 55 420 L 85 420 L 98 260 L 102 260 L 115 420 L 145 420 L 130 220 Q 100 240 70 220 Z" />
                            </g>
                            <g id="micro-legs" class="hidden">
                                <path id="leg-l-thigh" class="micro-piece" d="M 70 220 L 63 320 L 90 320 L 98 260 Z" onclick="window.toggleTactilePiece('leg-l-thigh', 'Left Thigh')" />
                                <path id="leg-l-calf" class="micro-piece" d="M 63 320 L 55 420 L 85 420 L 90 320 Z" onclick="window.toggleTactilePiece('leg-l-calf', 'Left Calf/Foot')" />
                                
                                <path id="leg-r-thigh" class="micro-piece" d="M 130 220 L 137 320 L 110 320 L 102 260 Z" onclick="window.toggleTactilePiece('leg-r-thigh', 'Right Thigh')" />
                                <path id="leg-r-calf" class="micro-piece" d="M 137 320 L 145 420 L 115 420 L 110 320 Z" onclick="window.toggleTactilePiece('leg-r-calf', 'Right Calf/Foot')" />
                            </g>
                        </svg>
                    </div>
                </div>

                <div class="lg:col-span-7 bg-[#111422] border border-slate-800 rounded-3xl p-6 flex flex-col relative overflow-hidden h-full shadow-2xl">
                    
                    <div id="friction-column-empty" class="absolute inset-0 bg-[#0B0F19]/60 backdrop-blur-[4px] flex flex-col items-center justify-center p-6 z-10 transition-opacity duration-300">
                        <div class="border border-slate-700 bg-slate-900/50 shadow-2xl p-8 rounded-3xl text-center">
                            <span class="text-4xl block mb-4 drop-shadow-lg">🧩</span>
                            <p class="text-[11px] text-slate-300 font-black uppercase tracking-widest leading-relaxed">Select a holographic<br>anatomical sector to begin</p>
                        </div>
                    </div>

                    <div class="z-20 flex flex-col h-full">
                        <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4 flex-shrink-0">
                            <span class="text-[10px] font-black tracking-widest text-slate-400 uppercase">Functional Translation</span>
                            <span id="active-target-label" class="text-[10px] font-black tracking-widest text-[var(--accent)] uppercase drop-shadow-md">No Target Locked</span>
                        </div>
                        
                        <div id="symptom-bubbles-container" class="flex flex-wrap content-start gap-4 overflow-y-auto pb-24 scrollbar-none flex-grow">
                            </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="dossier-drawer" class="absolute bottom-0 left-0 right-0 bg-[#111422]/95 border-t border-slate-800 backdrop-blur-2xl z-50 translate-y-[calc(100%-60px)] transition-transform duration-500 cubic-bezier(0.4, 0, 0.2, 1) rounded-t-[2rem] shadow-[0_-20px_50px_rgba(0,0,0,0.6)]">
            <div onclick="window.toggleDossier()" class="h-[60px] flex items-center justify-between px-8 cursor-pointer select-none">
                <div class="flex items-center space-x-3">
                    <span class="w-2 h-2 rounded-full bg-slate-600" id="dossier-indicator"></span>
                    <span class="text-[11px] font-black uppercase tracking-widest text-white" id="dossier-text">0 Friction Blocks Compiled</span>
                </div>
                <span class="text-slate-400 font-bold transition-transform duration-300" id="dossier-chevron">ᐱ</span>
            </div>
            <div class="p-6 max-h-[350px] overflow-y-auto">
                <div id="dossier-list" class="space-y-3 mb-6"></div>
                <button onclick="alert('Dossier Compiled. Initiating AccessPoint dx API Handoff...')" class="w-full bg-white text-slate-950 font-black text-[11px] uppercase tracking-widest px-6 py-4 rounded-xl shadow-xl hover:bg-slate-200 transition">Initialize Fulfillment Route ➔</button>
            </div>
        </div>
    </main>

    <script>
        const SYMPTOM_DB = {
            'head-forehead': ['Sharp crushing temple compression', 'Surface sensitivity to lighting'],
            'head-eyes': ['Blurry tracking visions', 'Deep retro-orbital point pressures'],
            'head-jaw': ['Radiating crown/tooth pains', 'Temporomandibular joint clicking'],
            'torso-chest': ['Rapid tachycardic spike tracks', 'Heavy sub-sternal anchor weights', 'Sharp pleural stitching'],
            'torso-stomach': ['Gaseous ballooning distension', 'Burning epigastric acid reflux', 'Spasmodic colic contractions'],
            'arm-l-shoulder': ['Rotator cuff impingement friction', 'Deep joint capsule aching'],
            'arm-l-hand': ['Vascular peripheral numbness', 'Radiating pins & needles', 'Grip strength failure'],
            'arm-r-shoulder': ['Rotator cuff impingement friction', 'Deep joint capsule aching'],
            'arm-r-hand': ['Vascular peripheral numbness', 'Radiating pins & needles', 'Grip strength failure'],
            'leg-l-calf': ['Deep vein throbbing', 'Load-bearing localized structural pain'],
            'leg-r-calf': ['Deep vein throbbing', 'Load-bearing localized structural pain'],
            'default': ['Dull localized aching', 'Sharp movement-based friction', 'Structural swelling']
        };

        let isDiscreetMode = false, isBackView = false, activeMacroZone = null, activeMicroPiece = null, compiledDossier = [], isDossierOpen = false;
        let activeSymptomId = null; // Tracks the specific symptom being edited

        // --- TAB SWITCHING ---
        window.switchTab = function(index) {
            for(let i=1; i<=3; i++) {
                document.getElementById('tab-'+i).classList.add('hidden');
                document.getElementById('tab-btn-'+i).className = "border border-transparent text-slate-500 hover:text-slate-300 flex flex-col items-center justify-center py-2 rounded-xl transition";
            }
            document.getElementById('tab-'+index).classList.remove('hidden');
            document.getElementById('tab-btn-'+index).className = "bg-[var(--accent-glow)] border border-[var(--accent)] text-[var(--accent)] flex flex-col items-center justify-center py-2 rounded-xl transition";
        };

        // --- NATIVE SWIPE GESTURES ---
        let touchstartX = 0;
        document.getElementById('touch-area').addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        document.getElementById('touch-area').addEventListener('touchend', e => {
            if (e.changedTouches[0].screenX - touchstartX > 60 && activeMacroZone) window.resetMacroMap(); // Swipe Right
        });

        // --- HOLOGRAPHIC CAMERA MECHANICS ---
        window.pivotBody = function(view) {
            isBackView = (view === 'Back');
            document.getElementById('btn-front').className = isBackView ? "text-slate-500 hover:text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition" : "bg-slate-800 text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition shadow-sm";
            document.getElementById('btn-back').className = isBackView ? "bg-slate-800 text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition shadow-sm" : "text-slate-500 hover:text-white text-[9px] font-bold uppercase tracking-widest px-3 py-1.5 rounded-md transition";
            document.getElementById('human-svg').classList.toggle('flipped', isBackView);
            window.resetMacroMap();
        };

        window.fractureZone = function(zoneName, scale, translateY) {
            activeMacroZone = zoneName;
            
            // 1. Ghost non-active macros
            document.querySelectorAll('.macro-zone').forEach(el => el.classList.add('ghosted'));
            document.getElementById(`macro-${zoneName}`).classList.add('hidden');
            
            // 2. Reveal micro pieces
            document.querySelectorAll('[id^="micro-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`micro-${zoneName}`).classList.remove('hidden');
            
            // 3. Dynamic Camera Zoom
            document.getElementById('human-svg').style.transform = `scale(${scale}) translateY(${translateY}%) ${isBackView ? 'scaleX(-1)' : ''}`;
            
            // 4. Hide Master Header to save space (Sticky Hide)
            document.getElementById('master-header').style.transform = "translateY(-100%)";
            document.getElementById('master-header').style.position = "absolute";
            document.getElementById('organ-track').classList.add('hidden');
            
            document.getElementById('btn-reset').classList.remove('hidden');
        };

        window.resetMacroMap = function() {
            document.querySelectorAll('.macro-zone').forEach(el => { el.classList.remove('ghosted'); el.classList.remove('hidden'); });
            document.querySelectorAll('[id^="micro-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.micro-piece').forEach(el => { el.classList.remove('piece-active'); el.style.fill = ''; });
            
            // Reset Camera
            document.getElementById('human-svg').style.transform = isBackView ? 'scaleX(-1)' : 'scale(1)';
            
            // Reveal Master Header
            document.getElementById('master-header').style.transform = "translateY(0)";
            document.getElementById('master-header').style.position = "relative";
            document.getElementById('organ-track').classList.remove('hidden');

            document.getElementById('friction-column-empty').style.opacity = '1';
            document.getElementById('friction-column-empty').style.pointerEvents = 'auto';
            document.getElementById('heat-map-control').classList.add('hidden');
            document.getElementById('btn-reset').classList.add('hidden');
            
            activeMacroZone = null; activeMicroPiece = null; activeSymptomId = null;
        };

        window.toggleTactilePiece = function(pieceId, labelName) {
            const el = document.getElementById(pieceId);
            if(el.classList.contains('piece-active')) {
                el.classList.remove('piece-active');
                if(activeMicroPiece && activeMicroPiece.id === pieceId) {
                    document.getElementById('heat-map-control').classList.add('hidden');
                    document.getElementById('friction-column-empty').style.opacity = '1';
                    document.getElementById('friction-column-empty').style.pointerEvents = 'auto';
                    activeMicroPiece = null; activeSymptomId = null;
                }
                return;
            }
            // Deselect others in this micro-group for clean UI
            document.querySelectorAll(`#micro-${activeMacroZone} .micro-piece`).forEach(p => p.classList.remove('piece-active'));
            
            el.classList.add('piece-active');
            activeMicroPiece = { id: pieceId, label: (isBackView ? "Posterior " : "") + labelName, severity: 1 };
            
            const hm = document.getElementById('heat-map-control');
            hm.classList.remove('hidden');
            document.getElementById('severity-slider').value = 1;
            window.updateHeatMap(1);

            populateSymptoms(pieceId);
        };

        function populateSymptoms(pieceId) {
            document.getElementById('friction-column-empty').style.opacity = '0';
            document.getElementById('friction-column-empty').style.pointerEvents = 'none';
            document.getElementById('active-target-label').innerText = `TARGET: ${activeMicroPiece.label}`;
            
            const container = document.getElementById('symptom-bubbles-container');
            container.innerHTML = "";
            let symptoms = SYMPTOM_DB[pieceId] || SYMPTOM_DB['default'];
            
            symptoms.forEach(sym => {
                const wrapper = document.createElement('div'); wrapper.className = "w-full";
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-slate-900 border border-slate-700 hover:border-[var(--accent)] text-slate-300 text-xs px-5 py-4 rounded-2xl transition shadow-md";
                btn.innerText = `"${sym}"`;
                btn.onclick = () => handleSymptomClick(wrapper, sym, btn);
                wrapper.appendChild(btn); container.appendChild(wrapper);
            });
        }

        // --- ZERO FRICTION AUTO-COMMIT ---
        function handleSymptomClick(wrapper, symptomText, btnElement) {
            if(wrapper.querySelector('.duration-track')) return; // Already expanded
            
            // Instantly commit to dossier
            const newId = Date.now();
            activeSymptomId = newId;
            compiledDossier.push({ id: newId, pieceId: activeMicroPiece.id, label: isDiscreetMode ? "Secured Segment" : activeMicroPiece.label, symptom: symptomText, severity: activeMicroPiece.severity, duration: '24 Hrs' });
            renderDossier();
            
            // Show UI Editor
            btnElement.classList.add('border-[var(--accent)]', 'bg-[var(--accent-glow)]');
            const track = document.createElement('div');
            track.className = "duration-track mt-3 ml-4 flex space-x-2 animate-fade-in";
            track.innerHTML = `
                <button onclick="updateDuration(${newId}, '24 Hrs', this)" class="time-btn bg-[var(--accent)] text-slate-950 text-[10px] font-black px-4 py-2 rounded-full transition">24 Hrs</button>
                <button onclick="updateDuration(${newId}, '3-5 Days', this)" class="time-btn bg-slate-800 border border-slate-700 text-slate-400 hover:text-white text-[10px] font-bold px-4 py-2 rounded-full transition">3-5 Days</button>
                <button onclick="updateDuration(${newId}, 'Weeks', this)" class="time-btn bg-slate-800 border border-slate-700 text-slate-400 hover:text-white text-[10px] font-bold px-4 py-2 rounded-full transition">Weeks</button>
            `;
            wrapper.appendChild(track);
        }

        window.updateDuration = function(id, duration, btnEl) {
            let item = compiledDossier.find(i => i.id === id);
            if(item) item.duration = duration;
            // Reset sibling buttons
            Array.from(btnEl.parentElement.children).forEach(b => {
                b.className = "time-btn bg-slate-800 border border-slate-700 text-slate-400 hover:text-white text-[10px] font-bold px-4 py-2 rounded-full transition";
            });
            // Highlight clicked
            btnEl.className = "time-btn bg-[var(--accent)] text-slate-950 text-[10px] font-black px-4 py-2 rounded-full transition";
            renderDossier();
        };

        window.updateHeatMap = function(val) {
            if(!activeMicroPiece) return;
            activeMicroPiece.severity = val;
            
            let color = val <= 4 ? '#10B981' : (val <= 7 ? '#F59E0B' : '#EF4444');
            let txtClass = val <= 4 ? 'text-emerald-400' : (val <= 7 ? 'text-amber-400' : 'text-red-500');
            
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + '66');
            document.getElementById('severity-val').innerText = val;
            document.getElementById('severity-val').className = `text-[12px] font-black ${txtClass} drop-shadow-md`;

            // Update all dossier items tied to this physical piece
            compiledDossier.forEach(item => { if(item.pieceId === activeMicroPiece.id) item.severity = val; });
            renderDossier();
        };

        // --- DOSSIER LOGIC ---
        function renderDossier() {
            const container = document.getElementById('dossier-list');
            document.getElementById('dossier-text').innerText = `${compiledDossier.length} Friction Blocks Compiled`;
            document.getElementById('dossier-indicator').className = compiledDossier.length > 0 ? "w-2 h-2 rounded-full bg-[var(--accent)] shadow-[0_0_8px_var(--accent-glow)]" : "w-2 h-2 rounded-full bg-slate-600";
            
            container.innerHTML = "";
            compiledDossier.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 border border-slate-700 p-4 rounded-xl flex justify-between items-center shadow-md";
                let sColor = item.severity <= 4 ? "text-emerald-500" : (item.severity <= 7 ? "text-amber-500" : "text-red-500");
                div.innerHTML = `
                    <div>
                        <div class="flex items-center space-x-3 mb-1">
                            <span class="text-[10px] font-black uppercase tracking-widest ${sColor}">[ HEAT: ${item.severity} ] ${item.label}</span>
                            <span class="text-[9px] text-slate-300 font-bold bg-slate-800 border border-slate-600 px-2 py-0.5 rounded-full">${item.duration}</span>
                        </div>
                        <p class="text-xs text-slate-400 font-mono mt-2">"${item.symptom}"</p>
                    </div>
                    <button onclick="compiledDossier = compiledDossier.filter(i => i.id !== ${item.id}); renderDossier();" class="text-slate-600 hover:text-red-500 font-bold px-3 text-lg">✕</button>
                `;
                container.appendChild(div);
            });
        }

        window.toggleDossier = function() {
            isDossierOpen = !isDossierOpen;
            const drw = document.getElementById('dossier-drawer'), chev = document.getElementById('dossier-chevron');
            drw.style.transform = isDossierOpen ? 'translateY(0)' : 'translateY(calc(100% - 60px))';
            chev.style.transform = isDossierOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        };

        window.toggleDiscreetMode = function() {
            isDiscreetMode = !isDiscreetMode;
            document.body.className = isDiscreetMode ? "discreet-active bg-[var(--bg-main)] text-slate-200 font-sans antialiased h-screen flex flex-col overflow-hidden" : "bg-[var(--bg-main)] text-slate-200 font-sans antialiased h-screen flex flex-col overflow-hidden";
            document.getElementById('discreet-text').innerText = isDiscreetMode ? "Discreet: ACTIVE" : "Discreet: OFF";
            document.getElementById('brand-logo').innerText = isDiscreetMode ? "MR System" : "Medical Room™";
            renderDossier();
        };
    </script>
</body>
</html>
